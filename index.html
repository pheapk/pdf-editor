<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Editor</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>
    <header>
        <h1>PDF Editor</h1>
        <div id="toolbar" class="hidden">
            <div class="toolbar-group">
                <button id="prevPage" title="Previous page">&larr; Prev</button>
                <span id="pageInfo">Page 1 / 1</span>
                <button id="nextPage" title="Next page">Next &rarr;</button>
            </div>
            <div class="toolbar-group tool-toggle">
                <button id="toolText" class="tool-btn active" title="Text tool">Text</button>
                <button id="toolRect" class="tool-btn" title="Rectangle tool">Rect</button>
            </div>
            <div id="textControls" class="toolbar-group">
                <label for="fontSize">Size:</label>
                <input type="number" id="fontSize" value="16" min="6" max="72" step="1">
                <label for="fontColor">Color:</label>
                <input type="color" id="fontColor" value="#000000">
                <label for="fontFamily">Font:</label>
                <select id="fontFamily">
                    <option value="Helvetica">Helvetica</option>
                    <option value="TimesRoman">Times Roman</option>
                    <option value="Courier">Courier</option>
                </select>
            </div>
            <div id="rectControls" class="toolbar-group hidden">
                <label for="rectFill">Fill:</label>
                <input type="color" id="rectFill" value="#2563eb">
                <label for="rectFillOpacity">
                    <input type="range" id="rectFillOpacity" min="0" max="100" value="20" title="Fill opacity">
                </label>
                <label for="rectBorder">Border:</label>
                <input type="color" id="rectBorder" value="#1e293b">
                <label for="rectBorderOpacity">
                    <input type="range" id="rectBorderOpacity" min="0" max="100" value="100" title="Border opacity">
                </label>
                <label for="rectBorderWidth">Width:</label>
                <input type="number" id="rectBorderWidth" value="2" min="0" max="20" step="0.5">
            </div>
            <div class="toolbar-group">
                <button id="undoBtn" title="Remove last overlay">Undo</button>
                <button id="clearPageBtn" title="Clear all overlays on this page">Clear Page</button>
                <button id="saveBtn" class="primary" title="Save and download PDF">Save &amp; Download</button>
            </div>
        </div>
    </header>

    <main>
        <div id="uploadArea">
            <div id="dropZone">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="12" y1="18" x2="12" y2="12"></line>
                    <polyline points="9 15 12 12 15 15"></polyline>
                </svg>
                <p>Drag &amp; drop a PDF here</p>
                <p class="subtle">or</p>
                <button id="filePickerBtn">Choose File</button>
                <input type="file" id="fileInput" accept=".pdf" hidden>
            </div>
        </div>

        <div id="editorArea" class="hidden">
            <div id="canvasContainer">
                <canvas id="pdfCanvas"></canvas>
                <div id="textLayer"></div>
            </div>
            <p id="hint">Click anywhere to add text &mdash; switch to Rect to draw rectangles</p>
        </div>
    </main>

    <div id="loadingOverlay" class="hidden">
        <div class="spinner"></div>
        <p>Processing PDF...</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
